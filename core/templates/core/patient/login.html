{% extends 'core/base.html' %}
{% load static %}
{% block extra_css %}
<style>
    /* Login page specific styles */
    .login-container {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        width: 100%;
        max-width: 450px;
        background-color: var(--bg-card);
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border-subtle);
        transform: translateY(0);
        transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    .login-header {
        background-color: var(--bg-darker);
        padding: 2rem;
        text-align: center;
        border-bottom: 1px solid var(--border-subtle);
    }

    .login-title {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
    }

    .login-title i {
        color: var(--primary);
    }

    .login-body {
        padding: 2.5rem;
    }

    .form-floating {
        margin-bottom: 1.5rem;
    }

    .form-floating label {
        color: var(--text-muted);
    }

    .form-floating .form-control {
        background-color: var(--bg-input);
        border: 1px solid var(--border-subtle);
        color: var(--text-primary);
        height: calc(3.5rem + 2px);
        padding: 1.5rem 1rem 0.5rem;
    }

    .form-floating .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }

    .login-button {
        height: 3.5rem;
        font-size: 1.1rem;
        font-weight: 500;
        margin-top: 1rem;
    }

    .login-footer {
        text-align: center;
        margin-top: 2rem;
    }

    .login-footer a {
        color: var(--primary);
        text-decoration: none;
        transition: color var(--transition-fast);
    }

    .login-footer a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    /* Animations */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock extra_css %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mb-4">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post" id="loginForm">
                {% csrf_token %}
                <div class="form-floating">
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="Phone Number" required>
                    <label for="phone"><i class="fas fa-phone me-2"></i>Phone Number</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required>
                    <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 login-button">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <div class="login-footer">
                <a href="/" class="d-block mb-2">
                    <i class="fas fa-home me-1"></i>Return to Homepage
                </a>
                <a href="{% url 'patient_register' %}" class="d-block">
                    <i class="fas fa-user-plus me-1"></i>New Patient? Register Here
                </a>
            </div>
        </div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Animate login card
        const loginCard = document.querySelector('.login-card');
        loginCard.style.opacity = '0';
        loginCard.style.transform = 'translateY(20px)';

        setTimeout(() => {
            loginCard.style.transition = 'all 0.5s ease';
            loginCard.style.opacity = '1';
            loginCard.style.transform = 'translateY(0)';
        }, 200);

        // Animate form elements
        const formElements = document.querySelectorAll('.form-floating, .login-button');
        formElements.forEach((element, index) => {
            element.style.opacity = '0';
            element.style.transform = 'translateY(10px)';

            setTimeout(() => {
                element.style.transition = 'all 0.4s ease';
                element.style.opacity = '1';
                element.style.transform = 'translateY(0)';
            }, 500 + (index * 100));
        });

        // Focus first input
        setTimeout(() => {
            document.getElementById('phone').focus();
        }, 800);
    });
</script>
